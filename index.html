<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubik's Cube Tutorial</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="top-bar">
        <select id="cube-selector">
            <option value="3x3">3x3 Cube</option>
            <option value="5x5">5x5 Cube</option>
            <option value="pyraminx">Pyraminx</option>
        </select>
        <button id="tutorial-toggle">Tutorial</button>
    </div>

    <div id="tutorial-panel" class="hidden">
        <h2 id="tutorial-title">White Cross</h2>
        <p id="tutorial-desc">Create the white cross first.</p>
        <div class="tutorial-controls">
            <button id="tutorial-prev">Previous</button>
            <span id="tutorial-step">1 / 3</span>
            <button id="tutorial-next">Next</button>
        </div>
    </div>

    <div id="bottom-bar">
        <button id="scramble-btn">Scramble</button>
        <button id="solve-btn">Solve</button>
    </div>

    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- GSAP for animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <script type="module" src="js/app.js"></script>
</body>
</html>
